name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test API
        env:
          GOSUMDB: "off"
        run: go test ./...

  component:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/component
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test component
        env:
          GOSUMDB: "off"
        run: go test ./...

  ui-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/unit/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test/unit/ui/package-lock.json
      - run: npm ci
      - run: npm test

  ui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - run: npm ci
      - run: npm run build

  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm test
        env:
          CI: "true"
          GOSUMDB: "off"

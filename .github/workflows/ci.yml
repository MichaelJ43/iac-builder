name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test API
        env:
          GOSUMDB: "off"
          # With GOSUMDB=off, auto-downloaded toolchains cannot be verified; pin to setup-go's binary.
          GOTOOLCHAIN: local
        run: go test ./...

  component:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/component
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test component
        env:
          GOSUMDB: "off"
          GOTOOLCHAIN: local
        run: go test ./...

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - run: npm ci
      - run: npm run test:unit
      - run: npm run build

  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            src/ui/package-lock.json
            test/ui/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      # Playwright webServer starts Vite from src/ui — install UI deps first.
      - run: npm ci
        working-directory: src/ui
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm test
        env:
          CI: "true"
          GOSUMDB: "off"
          GOTOOLCHAIN: local

name: Preview AWS (S3 + CloudFront + ALB + Lambda)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, closed]

permissions:
  id-token: write
  contents: read
  deployments: write
  issues: write
  pull-requests: write

concurrency:
  group: preview-aws-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PREVIEW_ENVIRONMENT: preview-pr-${{ github.event.pull_request.number }}
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: iac-builder-pr-${{ github.event.pull_request.number }}
  TF_IN_AUTOMATION: "true"
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: iac-builder/previews/pr-${{ github.event.pull_request.number }}/${{ vars.AWS_REGION || 'us-east-1' }}/terraform.tfstate
  AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN || vars.AWS_DEPLOY_ROLE_ARN }}
  TF_ACM_CERTIFICATE_ARN: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
  TF_CUSTOM_DOMAIN: ${{ vars.TF_CUSTOM_DOMAIN }}
  TF_ROUTE53_HOSTED_ZONE_ID: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}

jobs:
  deploy:
    name: Deploy preview
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Registers each preview as a GitHub Deployment with a dynamic environment.
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.tf.outputs.app_url }}
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require preview configuration
        run: |
          test -n "$TF_STATE_BUCKET" || (echo "Set repository Variable or Secret TF_STATE_BUCKET." && exit 1)
          test -n "$AWS_DEPLOY_ROLE_ARN" || (echo "Set repository Variable or Secret AWS_DEPLOY_ROLE_ARN." && exit 1)
          test -n "$TF_CUSTOM_DOMAIN" || (echo "Set repository Variable TF_CUSTOM_DOMAIN, for example iacbuilder.michaelj43.dev." && exit 1)
          test -n "$TF_ACM_CERTIFICATE_ARN" || (echo "Set repository Secret TF_ACM_CERTIFICATE_ARN." && exit 1)
          test -n "$TF_ROUTE53_HOSTED_ZONE_ID" || (echo "Set repository Secret TF_ROUTE53_HOSTED_ZONE_ID." && exit 1)

      - name: Build Lambda zip
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh"
          "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh" "$GITHUB_WORKSPACE/dist/lambda.zip"

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        run: |
          set -euo pipefail
          PREVIEW_SITE_DOMAIN="pr-${PR_NUMBER}.${TF_CUSTOM_DOMAIN}"
          PREVIEW_API_DOMAIN="api-pr-${PR_NUMBER}.${TF_CUSTOM_DOMAIN}"

          terraform apply -auto-approve -input=false \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="lambda_package=$GITHUB_WORKSPACE/dist/lambda.zip" \
            -var="custom_domain=${PREVIEW_SITE_DOMAIN}" \
            -var="api_custom_domain=${PREVIEW_API_DOMAIN}" \
            -var="acm_certificate_arn=${TF_ACM_CERTIFICATE_ARN}" \
            -var="route53_hosted_zone_id=${TF_ROUTE53_HOSTED_ZONE_ID}"

      - name: Capture Terraform outputs
        id: tf
        run: |
          echo "app_url=$(terraform output -raw app_url)" >> "$GITHUB_OUTPUT"
          echo "api_public_hostname=$(terraform output -raw api_public_hostname)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "ui_bucket_name=$(terraform output -raw ui_bucket_name)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Build UI (same-origin /api via CloudFront)
        working-directory: src/ui
        run: |
          npm ci
          npm run build

      - name: Sync UI to S3
        run: |
          aws s3 sync "$GITHUB_WORKSPACE/src/ui/dist/" "s3://${{ steps.tf.outputs.ui_bucket_name }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp "$GITHUB_WORKSPACE/src/ui/dist/index.html" "s3://${{ steps.tf.outputs.ui_bucket_name }}/index.html" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- iac-builder-preview -->';
            const body = [
              marker,
              '### Preview deployment',
              '',
              '- Site: ${{ steps.tf.outputs.app_url }}',
              '- API origin: ${{ steps.tf.outputs.api_public_hostname }}',
              '- CloudFront: https://${{ steps.tf.outputs.cloudfront_domain_name }}',
              '- GitHub environment: `${{ env.PREVIEW_ENVIRONMENT }}`',
              '- Terraform state: `${{ env.TF_STATE_KEY }}`',
              '',
              'This preview is isolated to PR #${{ github.event.pull_request.number }} and will be destroyed when the PR closes.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Summary
        run: |
          echo "### Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site: ${{ steps.tf.outputs.app_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API origin: ${{ steps.tf.outputs.api_public_hostname }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- CloudFront: https://${{ steps.tf.outputs.cloudfront_domain_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub environment: \`${PREVIEW_ENVIRONMENT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform state key: \`${TF_STATE_KEY}\`" >> "$GITHUB_STEP_SUMMARY"

  teardown:
    name: Teardown preview
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require preview configuration
        run: |
          test -n "$TF_STATE_BUCKET" || (echo "Set repository Variable or Secret TF_STATE_BUCKET." && exit 1)
          test -n "$AWS_DEPLOY_ROLE_ARN" || (echo "Set repository Variable or Secret AWS_DEPLOY_ROLE_ARN." && exit 1)
          test -n "$TF_CUSTOM_DOMAIN" || (echo "Set repository Variable TF_CUSTOM_DOMAIN." && exit 1)
          test -n "$TF_ACM_CERTIFICATE_ARN" || (echo "Set repository Secret TF_ACM_CERTIFICATE_ARN." && exit 1)
          test -n "$TF_ROUTE53_HOSTED_ZONE_ID" || (echo "Set repository Secret TF_ROUTE53_HOSTED_ZONE_ID." && exit 1)

      - name: Build throwaway Lambda zip
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh"
          "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh" "$GITHUB_WORKSPACE/dist/lambda.zip"

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        run: |
          set -euo pipefail
          PREVIEW_SITE_DOMAIN="pr-${PR_NUMBER}.${TF_CUSTOM_DOMAIN}"
          PREVIEW_API_DOMAIN="api-pr-${PR_NUMBER}.${TF_CUSTOM_DOMAIN}"

          terraform destroy -auto-approve -input=false \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="lambda_package=$GITHUB_WORKSPACE/dist/lambda.zip" \
            -var="custom_domain=${PREVIEW_SITE_DOMAIN}" \
            -var="api_custom_domain=${PREVIEW_API_DOMAIN}" \
            -var="acm_certificate_arn=${TF_ACM_CERTIFICATE_ARN}" \
            -var="route53_hosted_zone_id=${TF_ROUTE53_HOSTED_ZONE_ID}"

      - name: Delete preview Terraform state
        run: aws s3 rm "s3://${TF_STATE_BUCKET}/${TF_STATE_KEY}" || true

      - name: Mark deployments inactive and remove environment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const environment = process.env.PREVIEW_ENVIRONMENT;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              environment,
              per_page: 100,
            });

            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner,
                repo,
                deployment_id: deployment.id,
                state: 'inactive',
                log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                description: `Preview environment ${environment} was destroyed`,
              });
            }

            try {
              await github.request('DELETE /repos/{owner}/{repo}/environments/{environment_name}', {
                owner,
                repo,
                environment_name: environment,
              });
              core.setOutput('environment_cleanup', 'deleted');
            } catch (error) {
              core.warning(`Could not delete GitHub environment ${environment}: ${error.message}`);
              core.setOutput('environment_cleanup', 'not deleted');
            }

      - name: Comment teardown
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- iac-builder-preview -->';
            const body = [
              marker,
              '### Preview deployment',
              '',
              'Preview environment for PR #${{ github.event.pull_request.number }} has been destroyed.',
              '',
              '- GitHub environment: `${{ env.PREVIEW_ENVIRONMENT }}`',
              '- Terraform state removed: `${{ env.TF_STATE_KEY }}`',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Summary
        run: |
          echo "### Preview teardown" >> "$GITHUB_STEP_SUMMARY"
          echo "- Destroyed PR #${PR_NUMBER} preview resources." >> "$GITHUB_STEP_SUMMARY"
          echo "- Marked GitHub deployments inactive for \`${PREVIEW_ENVIRONMENT}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- Removed Terraform state key: \`${TF_STATE_KEY}\`" >> "$GITHUB_STEP_SUMMARY"

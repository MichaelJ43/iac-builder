name: Destroy AWS stack

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "Region of the stack to destroy"
        required: true
        default: "us-east-1"
      project_name:
        description: "Resource prefix used for this stack"
        required: true
        default: "iac-builder"
      confirm:
        description: 'Type DELETE to confirm full teardown'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      TF_IN_AUTOMATION: "true"
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || vars.TF_STATE_BUCKET }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN || vars.AWS_DEPLOY_ROLE_ARN }}
      # Optional legacy ALB vars when not using custom_domain + acm in Terraform; otherwise leave empty.
      ALB_CERTIFICATE_ARN: ${{ secrets.ALB_CERTIFICATE_ARN }}
      API_PUBLIC_HOSTNAME: ${{ vars.API_PUBLIC_HOSTNAME }}
      TF_ACM_CERTIFICATE_ARN: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
      TF_CUSTOM_DOMAIN: ${{ vars.TF_CUSTOM_DOMAIN }}
      TF_ROUTE53_HOSTED_ZONE_ID: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4

      - name: Confirm
        run: |
          test "${{ inputs.confirm }}" = "DELETE" || (echo 'Set confirm to DELETE' && exit 1)

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build throwaway Lambda zip (required variable for destroy refresh)
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh"
          "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh" "$GITHUB_WORKSPACE/dist/lambda.zip"

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=iac-builder/${{ inputs.project_name }}/${{ inputs.aws_region }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        run: |
          set -euo pipefail
          if [ -n "${TF_CUSTOM_DOMAIN:-}" ]; then export TF_VAR_custom_domain="${TF_CUSTOM_DOMAIN}"; fi
          if [ -n "${TF_ACM_CERTIFICATE_ARN:-}" ]; then export TF_VAR_acm_certificate_arn="${TF_ACM_CERTIFICATE_ARN}"; fi
          if [ -n "${TF_ROUTE53_HOSTED_ZONE_ID:-}" ]; then export TF_VAR_route53_hosted_zone_id="${TF_ROUTE53_HOSTED_ZONE_ID}"; fi
          EXTRA_TF_VARS=()
          if [ -n "${ALB_CERTIFICATE_ARN:-}" ] && [ -n "${API_PUBLIC_HOSTNAME:-}" ]; then
            EXTRA_TF_VARS+=(
              -var="alb_https_enabled=true"
              -var="alb_certificate_arn=${ALB_CERTIFICATE_ARN}"
              -var="api_public_hostname=${API_PUBLIC_HOSTNAME}"
            )
          fi
          terraform destroy -auto-approve -input=false \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="project_name=${{ inputs.project_name }}" \
            -var="lambda_package=$GITHUB_WORKSPACE/dist/lambda.zip" \
            "${EXTRA_TF_VARS[@]}"

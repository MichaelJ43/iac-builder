name: Deploy AWS (S3 + CloudFront + Lambda Function URL)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region for this stack (add more regions by duplicating the workflow with another region + separate state key)."
        required: true
        default: "us-east-1"
      project_name:
        description: "Resource name prefix"
        required: true
        default: "iac-builder"

permissions:
  id-token: write
  contents: read
  deployments: write

concurrency:
  group: deploy-aws-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Registers each run as a GitHub "Deployment" (Environments + commit/deployments graph).
    environment:
      name: production
      url: ${{ steps.app_deployment_url.outputs.url }}
    env:
      # workflow_dispatch: use inputs. push: defaults match workflow_dispatch defaults.
      AWS_REGION: ${{ github.event.inputs.aws_region || 'us-east-1' }}
      PROJECT_NAME: ${{ github.event.inputs.project_name || 'iac-builder' }}
      TF_IN_AUTOMATION: "true"
      # Repository Variables or Secrets (same names). Secrets win if both are set.
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || vars.TF_STATE_BUCKET }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN || vars.AWS_DEPLOY_ROLE_ARN }}
      # Optional CloudFront custom domain: TF_CUSTOM_DOMAIN (Variable) + TF_ACM_CERTIFICATE_ARN + optional TF_ROUTE53_HOSTED_ZONE_ID (Secrets). Export only when set so empty strings are not passed as TF_VARs.
      TF_ACM_CERTIFICATE_ARN: ${{ secrets.TF_ACM_CERTIFICATE_ARN }}
      TF_CUSTOM_DOMAIN: ${{ vars.TF_CUSTOM_DOMAIN }}
      TF_ROUTE53_HOSTED_ZONE_ID: ${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require remote state bucket and deploy role
        run: |
          test -n "$TF_STATE_BUCKET" || (echo "Set repository Variable or Secret TF_STATE_BUCKET (S3 bucket name for Terraform state)." && exit 1)
          test -n "$AWS_DEPLOY_ROLE_ARN" || (echo "Set repository Variable or Secret AWS_DEPLOY_ROLE_ARN (IAM role ARN for OIDC)." && exit 1)

      - name: Build Lambda zip
        env:
          GOTOOLCHAIN: local
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh"
          "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh" "$GITHUB_WORKSPACE/dist/lambda.zip"

      - name: Terraform init (S3 backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=iac-builder/${{ env.PROJECT_NAME }}/${{ env.AWS_REGION }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        run: |
          set -euo pipefail
          if [ -n "${TF_CUSTOM_DOMAIN:-}" ]; then export TF_VAR_custom_domain="${TF_CUSTOM_DOMAIN}"; fi
          if [ -n "${TF_ACM_CERTIFICATE_ARN:-}" ]; then export TF_VAR_acm_certificate_arn="${TF_ACM_CERTIFICATE_ARN}"; fi
          if [ -n "${TF_ROUTE53_HOSTED_ZONE_ID:-}" ]; then export TF_VAR_route53_hosted_zone_id="${TF_ROUTE53_HOSTED_ZONE_ID}"; fi
          terraform apply -auto-approve -input=false \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="lambda_package=$GITHUB_WORKSPACE/dist/lambda.zip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Build UI (same-origin /api via CloudFront)
        working-directory: src/ui
        run: |
          npm ci
          npm run build

      - name: Sync UI to S3
        run: |
          BUCKET="$(terraform output -raw ui_bucket_name)"
          aws s3 sync "$GITHUB_WORKSPACE/src/ui/dist" "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          DIST="$(terraform output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"

      - name: Print app URL
        id: app_deployment_url
        run: |
          APP_URL="$(terraform output -raw app_url)"
          CF_HOST="$(terraform output -raw cloudfront_domain_name)"
          echo "App URL: ${APP_URL}"
          echo "CloudFront hostname: https://${CF_HOST}"
          {
            echo "### Deployment"
            echo "- App (canonical): ${APP_URL}"
            echo "- CloudFront default host: https://${CF_HOST}"
          } >> "$GITHUB_STEP_SUMMARY"
          # Surfaces the live URL on the production environment deployment in GitHub.
          echo "url=${APP_URL}" >> "$GITHUB_OUTPUT"

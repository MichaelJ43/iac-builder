name: Deploy AWS (S3 + CloudFront + ALB + Lambda)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region for this stack (add more regions by duplicating the workflow with another region + separate state key)."
        required: true
        default: "us-east-1"
      project_name:
        description: "Resource name prefix"
        required: true
        default: "iac-builder"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ inputs.aws_region }}
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform/aws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Require remote state bucket
        run: |
          test -n "${{ secrets.TF_STATE_BUCKET }}" || (echo "Set repo secret TF_STATE_BUCKET (S3 bucket for terraform state)." && exit 1)

      - name: Build Lambda zip
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh"
          "$GITHUB_WORKSPACE/scripts/build-lambda-zip.sh" "$GITHUB_WORKSPACE/dist/lambda.zip"

      - name: Terraform init (S3 backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=iac-builder/${{ inputs.project_name }}/${{ inputs.aws_region }}/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="project_name=${{ inputs.project_name }}" \
            -var="lambda_package=$GITHUB_WORKSPACE/dist/lambda.zip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Build UI (same-origin /api via CloudFront)
        working-directory: src/ui
        run: |
          npm ci
          npm run build

      - name: Sync UI to S3
        run: |
          BUCKET="$(terraform output -raw ui_bucket_name)"
          aws s3 sync "$GITHUB_WORKSPACE/src/ui/dist" "s3://${BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          DIST="$(terraform output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"

      - name: Print app URL
        run: |
          HOST="$(terraform output -raw cloudfront_domain_name)"
          echo "App URL: https://${HOST}"
